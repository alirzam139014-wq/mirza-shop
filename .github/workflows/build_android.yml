name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - run: flutter create --platforms=android . --org com.mirzashop --project-name mirza_shop
      - name: Fix Android
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          cd android/app
          if [ -f build.gradle.kts ]; then
            sed -i 's/minSdk = .*/minSdk = 21/' build.gradle.kts
            sed -i 's/compileSdk = .*/compileSdk = 34/' build.gradle.kts
            sed -i 's/targetSdk = .*/targetSdk = 34/' build.gradle.kts
          fi
          if [ -f build.gradle ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/' build.gradle
            sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' build.gradle
          fi
          cd ../..
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: build/app/outputs/flutter-apk/app-release.apk
